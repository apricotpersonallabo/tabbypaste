# .github/workflows/main.yml
name: Build and release browser extensions

on:
  workflow_dispatch:
  push:
    branches: [ main ]  # adjust if needed

permissions:
  contents: write

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure version files exist
        run: |
          test -f "version.json" || (echo "version.json not found"; exit 1)
          test -f "src/manifest.json" || (echo "src/manifest.json not found"; exit 1)
          test -f "src/manifest.firefox.json" || (echo "src/manifest.firefox.json not found"; exit 1)

      - name: Increment and synchronize version
        run: node scripts/sync-manifest-version.mjs --increment

      - name: Read synchronized version
        id: ver
        run: |
          VERSION=$(jq -r '.version' "version.json")
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "No version found in version.json"; exit 1
          fi
          test "$(jq -r '.version' src/manifest.json)" = "$VERSION"
          test "$(jq -r '.version' src/manifest.firefox.json)" = "$VERSION"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Get repo name
        id: repo
        run: |
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          echo "repo_name=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Fail if the release/tag already exists
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi
          RELEASE_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$RELEASE_URL")
          if [ "$STATUS" -eq 200 ]; then
            echo "Release for tag $TAG already exists."
            exit 1
          fi

      - name: Commit synchronized version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json src/manifest.json src/manifest.firefox.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump extension version to $VERSION [skip ci]"
            git push
          fi

      - name: Create browser packages (zip root contains manifest.json)
        id: zip
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          REPO_NAME="${{ steps.repo.outputs.repo_name }}"
          CHROMIUM_ZIP="${REPO_NAME}-${TAG}-chromium.zip"
          FIREFOX_ZIP="${REPO_NAME}-${TAG}-firefox.zip"
          mkdir -p build/chromium build/firefox
          rsync -a --exclude "manifest.firefox.json" src/ build/chromium/
          rsync -a --exclude "manifest.json" --exclude "manifest.firefox.json" src/ build/firefox/
          cp src/manifest.firefox.json build/firefox/manifest.json
          (cd build/chromium && zip -r "../../$CHROMIUM_ZIP" . -x "node_modules/*" "*.map" ".DS_Store" "*.log")
          (cd build/firefox && zip -r "../../$FIREFOX_ZIP" . -x "node_modules/*" "*.map" ".DS_Store" "*.log")
          echo "chromium_zip=$CHROMIUM_ZIP" >> "$GITHUB_OUTPUT"
          echo "firefox_zip=$FIREFOX_ZIP" >> "$GITHUB_OUTPUT"

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.zip.outputs.chromium_zip }}
            ${{ steps.zip.outputs.firefox_zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
