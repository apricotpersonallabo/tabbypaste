<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabby Paste Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <h1 data-i18n="optionsTitle">Tabby Paste Settings</h1>

    <form id="optionsForm">
      <section>
        <h2 data-i18n="optionsGeneral">General</h2>
        <label class="field">
          <span data-i18n="optionsDelayMs">Delay after each operation (ms)</span>
          <input id="delayMs" name="delayMs" type="number" min="0" max="5000" step="10" />
        </label>
      </section>

      <section>
        <h2 data-i18n="optionsSelect">Select fields</h2>
        <label class="check">
          <input id="selectValueFirst" name="selectValueFirst" type="checkbox" />
          <span data-i18n="optionsSelectValueFirst">Search option values before visible text</span>
        </label>
        <label class="check">
          <input id="selectAllowContainsFallback" name="selectAllowContainsFallback" type="checkbox" />
          <span data-i18n="optionsSelectContains">Allow contains match when exact/prefix match fails</span>
        </label>
        <label class="check">
          <input id="selectVerifyAndRetry" name="selectVerifyAndRetry" type="checkbox" />
          <span data-i18n="optionsSelectRetry">Retry if the selected value is overwritten</span>
        </label>
        <label class="check">
          <input id="selectWaitOptions" name="selectWaitOptions" type="checkbox" />
          <span data-i18n="optionsSelectWait">Wait briefly for dynamically rendered options</span>
        </label>
      </section>

      <div class="actions">
        <button id="saveButton" type="submit" data-i18n="optionsSave">Save</button>
        <button id="resetButton" type="button" class="secondary" data-i18n="optionsReset">Reset</button>
        <span id="status" role="status" aria-live="polite"></span>
      </div>
    </form>
  </main>

  <script src="options.js"></script>
</body>
</html>
