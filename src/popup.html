<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <label class="toggle-row" for="extensionEnabled">
        <span id="toggleLabel">Enable extension</span>
        <span class="switch">
            <input id="extensionEnabled" type="checkbox" role="switch" />
            <span class="slider" aria-hidden="true"></span>
        </span>
    </label>
    <p id="toggleStatus" class="toggle-status" aria-live="polite"></p>
    <p>
        <button id="optionsButton" type="button">Settings</button>
    </p>
    <script src="popup.js"></script>
</body>
</html>
